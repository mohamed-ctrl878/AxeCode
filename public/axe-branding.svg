<svg viewBox="-50 0 1000 1050" xmlns="http://www.w3.org/2000/svg">
    <style>
        .v { stroke: #00e5ff; fill: none; stroke-linecap: round; filter: url(#g); animation: p-v 2s infinite alternate; }
        .v-c { stroke: #fff; fill: none; stroke-linecap: round; animation: p-c 2s infinite alternate; }
        .f-o { fill: #0066ff; filter: url(#sg); animation: fl 0.6s infinite alternate; opacity: 0.7; transform-origin: center; }
        .f-i { fill: #00e5ff; filter: url(#g); animation: fl-f 0.3s infinite alternate; transform-origin: center; }
        .c-c { fill: #e0ffff; filter: url(#ig); animation: p-cry 1.5s infinite alternate; }
        .emb { fill: #00e5ff; opacity: 0; animation: up 3s infinite linear; }

        @keyframes p-v { 0% { stroke-width: 2px; opacity: 0.6; } 100% { stroke-width: 4px; opacity: 1; } }
        @keyframes p-c { 0% { stroke-width: 0.5px; opacity: 0.5; } 100% { stroke-width: 2px; opacity: 1; } }
        @keyframes p-cry { 0% { transform: scale(0.95); } 100% { transform: scale(1.05); } }
        @keyframes fl { 0% { opacity: 0.5; transform: rotate(-1deg); } 100% { opacity: 0.9; transform: rotate(1deg); } }
        @keyframes fl-f { 0% { transform: scale(0.95); } 100% { transform: scale(1.05); } }
        @keyframes up { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 1; } 80% { opacity: 0.8; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
    <defs>
        <filter id="g"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="sg"><feGaussianBlur stdDeviation="12" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="ig"><feGaussianBlur stdDeviation="20" result="b1"/><feGaussianBlur stdDeviation="8" result="b2"/><feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <linearGradient id="mm" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3a404d"/><stop offset="50%" stop-color="#1f232b"/><stop offset="100%" stop-color="#0f1115"/></linearGradient>
        <linearGradient id="md" x1="100%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#1f232b"/><stop offset="100%" stop-color="#08090b"/></linearGradient>
        <linearGradient id="eh" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#8ba1b5"/><stop offset="50%" stop-color="#465466"/><stop offset="100%" stop-color="#1f232b"/></linearGradient>
        <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#111"/><stop offset="50%" stop-color="#2a2a2a"/><stop offset="100%" stop-color="#050505"/></linearGradient>
    </defs>
