# ============================================================
# AxeCode Frontend - CI Pipeline
# ============================================================
#
# Quality gate for the frontend codebase:
#   1. Lint — ESLint code quality check
#   2. Build — Ensure the app compiles successfully
#
# Deployment is handled automatically by Vercel on push to main.
# This pipeline acts as a GUARD — blocking broken code from merging.
# ============================================================

name: "AxeCode Frontend CI"

on:
  push:
    branches: ["**"]   # CI runs on ALL branches
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"

jobs:
  # ────────────────────────────────────────────
  # Job 1: CI — Quality Gate
  # ────────────────────────────────────────────
  ci:
    name: "🧪 CI — Lint & Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps

      - name: ESLint
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: Unit Tests
        id: test
        run: npm test -- --run

      - name: Build
        id: build
        run: npm run build
        env:
          VITE_API_BASE_URL: "https://api.axecode.qzz.io"

      - name: CI Summary
        if: always()
        run: |
          echo "## 🧪 Frontend CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ${{ steps.lint.outcome == 'success' && '✅ Passed' || '⚠️ Warnings' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests  | ${{ steps.test.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build  | ${{ steps.build.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────
  # Job 2: PR Feedback (on Pull Requests only)
  # ────────────────────────────────────────────
  pr-feedback:
    name: "💬 PR Feedback"
    needs: ci
    if: github.event_name == 'pull_request' && always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const ciStatus = '${{ needs.ci.result }}';
            const icon = ciStatus === 'success' ? '✅' : '❌';
            const body = `### ${icon} Frontend CI Results

            | Stage | Status |
            |-------|--------|
            | 🔍 ESLint | ${ciStatus === 'success' ? '✅ Passed' : '⚠️ Check logs'} |
            | 📦 Build  | ${ciStatus === 'success' ? '✅ Passed' : '❌ Failed'} |

            > **Deploy**: Vercel will deploy automatically after merge to \`main\`.
            
            [📋 View Full Logs](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
